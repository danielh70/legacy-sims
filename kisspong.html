<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Clash 💖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card { transition: all 0.2s; }
        .card:hover { transform: scale(1.08) rotate(2deg); box-shadow: 0 20px 25px -5px rgb(236 72 153 / 0.5); }
        .card.playable:hover { border-color: #22c55e; }
        .flying { position: absolute; pointer-events: none; font-size: 28px; animation: fly 1.2s forwards; }
        @keyframes fly { to { transform: translateY(-120px); opacity: 0; } }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-950 via-rose-950 to-pink-950 text-white min-h-screen">
    <div class="max-w-6xl mx-auto p-8">
        <div class="text-center mb-8">
            <h1 class="text-7xl font-bold tracking-tighter">HEART <span class="text-pink-400">CLASH</span> 💖</h1>
            <p class="text-2xl text-pink-300">Who will win their heart tonight?</p>
        </div>

        <!-- Player 1 (Dan) -->
        <div class="grid grid-cols-2 gap-8">
            <div class="bg-black/40 rounded-3xl p-6">
                <div class="flex justify-between items-center mb-4">
                    <div class="flex items-center gap-4">
                        <span class="text-5xl">❤️</span>
                        <div>
                            <p class="text-2xl font-bold">Dan</p>
                            <div class="h-4 w-48 bg-red-900 rounded-full overflow-hidden">
                                <div id="hp1" class="h-full bg-red-500 transition-all" style="width:100%"></div>
                            </div>
                            <p id="hpText1" class="text-sm">20 / 20</p>
                        </div>
                    </div>
                    <div id="mana1" class="flex gap-1"></div>
                </div>
                <div id="hand1" class="grid grid-cols-4 gap-3 min-h-[220px]"></div>
            </div>

            <!-- Player 2 (Girlfriend) -->
            <div class="bg-black/40 rounded-3xl p-6">
                <div class="flex justify-between items-center mb-4">
                    <div id="mana2" class="flex gap-1"></div>
                    <div class="flex items-center gap-4">
                        <div class="text-right">
                            <p class="text-2xl font-bold">Girlfriend</p>
                            <div class="h-4 w-48 bg-pink-900 rounded-full overflow-hidden">
                                <div id="hp2" class="h-full bg-pink-500 transition-all" style="width:100%"></div>
                            </div>
                            <p id="hpText2" class="text-sm">20 / 20</p>
                        </div>
                        <span class="text-5xl">💋</span>
                    </div>
                </div>
                <div id="hand2" class="grid grid-cols-4 gap-3 min-h-[220px]"></div>
            </div>
        </div>

        <div class="mt-8 flex justify-center">
            <button onclick="endTurn()" id="endTurnBtn"
                    class="bg-white text-purple-900 px-12 py-5 rounded-2xl font-bold text-2xl hover:scale-105 transition">
                END TURN
            </button>
        </div>

        <div id="log" class="mt-6 text-center text-pink-200 text-sm min-h-[80px]"></div>
    </div>

    <!-- Victory Overlay -->
    <div id="victory" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center">
        <div class="text-center">
            <div id="winEmoji" class="text-9xl mb-6"></div>
            <h2 id="winTitle" class="text-6xl font-bold mb-4"></h2>
            <p id="winSub" class="text-3xl text-pink-300 mb-10"></p>
            <button onclick="resetGame()" 
                    class="bg-white text-purple-900 px-10 py-4 rounded-full font-bold text-xl">Play Again 💖</button>
        </div>
    </div>

    <script>
        // Cards
        const allCards = [
            {id:1, name:"Sweet Whisper", emoji:"💌", cost:1, type:"damage", value:4, desc:"Deal 4 damage"},
            {id:2, name:"Handwritten Note", emoji:"📝", cost:1, type:"damage", value:5, desc:"Deal 5 damage"},
            {id:3, name:"Coffee Date", emoji:"☕", cost:2, type:"damage", value:6, desc:"Deal 6 damage"},
            {id:4, name:"Bouquet Surprise", emoji:"🌹", cost:2, type:"damage", value:7, desc:"Deal 7 damage"},
            {id:5, name:"Steamy Kiss", emoji:"💋", cost:3, type:"damage", value:9, desc:"Deal 9 damage"},
            {id:6, name:"Movie Night Snuggle", emoji:"🎥", cost:2, type:"heal", value:6, desc:"Heal 6"},
            {id:7, name:"Passionate Hug", emoji:"🤗", cost:3, type:"heal", value:9, desc:"Heal 9"},
            {id:8, name:"Picnic under Stars", emoji:"🌟", cost:2, type:"heal", value:7, desc:"Heal 7"},
            {id:9, name:"Love Letter Rush", emoji:"📜", cost:1, type:"draw", value:2, desc:"Draw 2 cards"},
            {id:10, name:"Flirty Tease", emoji:"😏", cost:2, type:"manaDrain", value:1, desc:"Opponent loses 1 Spark"},
            {id:11, name:"Wild Adventure", emoji:"🚀", cost:4, type:"damage", value:12, desc:"Deal 12 damage"},
            {id:12, name:"Heart Shield", emoji:"🛡️", cost:2, type:"heal", value:5, desc:"Heal 5 + gain 3 temp"}
        ];

        let p1 = { hp:20, maxHp:20, mana:0, maxMana:6, hand:[], deck:[], discard:[], name:"Dan", emoji:"❤️" };
        let p2 = { hp:20, maxHp:20, mana:0, maxMana:6, hand:[], deck:[], discard:[], name:"Girlfriend", emoji:"💋" };
        let currentPlayer = p1;
        let opponent = p2;
        let gameOver = false;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function initDecks() {
            p1.deck = shuffle([...allCards]);
            p2.deck = shuffle([...allCards]);
            p1.hand = p1.deck.splice(0,4);
            p2.hand = p2.deck.splice(0,4);
        }

        function createCardElement(card, owner) {
            const div = document.createElement('div');
            div.className = `card bg-white/10 border-4 border-transparent rounded-2xl p-4 cursor-pointer text-center ${owner === currentPlayer ? 'playable' : ''}`;
            div.innerHTML = `
                <div class="text-6xl mb-2">${card.emoji}</div>
                <div class="font-bold">${card.name}</div>
                <div class="text-xs text-pink-300">${card.desc}</div>
                <div class="mt-3 inline-flex items-center justify-center w-8 h-8 rounded-full bg-yellow-400 text-purple-900 font-bold text-xl">${card.cost}</div>
            `;
            if (owner === currentPlayer) {
                div.onclick = () => playCard(card);
            }
            return div;
        }

        function renderHands() {
            document.getElementById('hand1').innerHTML = '';
            document.getElementById('hand2').innerHTML = '';
            
            if (currentPlayer === p1) {
                p1.hand.forEach(c => document.getElementById('hand1').appendChild(createCardElement(c, p1)));
                p2.hand.forEach(c => {
                    const hidden = document.createElement('div');
                    hidden.className = 'bg-white/5 border-4 border-dashed border-pink-400/30 rounded-2xl p-4';
                    hidden.innerHTML = `<div class="text-6xl opacity-30">❓</div>`;
                    document.getElementById('hand2').appendChild(hidden);
                });
            } else {
                p2.hand.forEach(c => document.getElementById('hand2').appendChild(createCardElement(c, p2)));
                p1.hand.forEach(() => {
                    const hidden = document.createElement('div');
                    hidden.className = 'bg-white/5 border-4 border-dashed border-red-400/30 rounded-2xl p-4';
                    hidden.innerHTML = `<div class="text-6xl opacity-30">❓</div>`;
                    document.getElementById('hand1').appendChild(hidden);
                });
            }
        }

        function renderHP() {
            document.getElementById('hp1').style.width = (p1.hp / p1.maxHp * 100) + '%';
            document.getElementById('hpText1').textContent = `${p1.hp} / 20`;
            document.getElementById('hp2').style.width = (p2.hp / p2.maxHp * 100) + '%';
            document.getElementById('hpText2').textContent = `${p2.hp} / 20`;
        }

        function renderMana(player, id) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                const dot = document.createElement('div');
                dot.className = `w-7 h-7 rounded-full ${i < player.mana ? 'bg-yellow-400' : 'bg-white/20'}`;
                container.appendChild(dot);
            }
        }

        function addLog(text) {
            const log = document.getElementById('log');
            log.innerHTML = `<span class="text-pink-300">${text}</span>`;
        }

        function createFlyingNumber(x, y, text, color) {
            const num = document.createElement('div');
            num.className = 'flying';
            num.style.left = x + 'px';
            num.style.top = y + 'px';
            num.style.color = color;
            num.textContent = text;
            document.body.appendChild(num);
            setTimeout(() => num.remove(), 1500);
        }

        function playCard(card) {
            if (gameOver || currentPlayer.mana < card.cost) return;

            currentPlayer.mana -= card.cost;
            currentPlayer.hand = currentPlayer.hand.filter(c => c.id !== card.id);
            currentPlayer.discard.push(card);

            let message = `${currentPlayer.name} played ${card.name}!`;

            if (card.type === "damage") {
                opponent.hp = Math.max(0, opponent.hp - card.value);
                message += ` 💥 -${card.value}`;
                createFlyingNumber(500, 300, `-${card.value}`, '#f43f5e');
            } else if (card.type === "heal") {
                currentPlayer.hp = Math.min(currentPlayer.maxHp, currentPlayer.hp + card.value);
                message += ` 💖 +${card.value}`;
                createFlyingNumber(400, 300, `+${card.value}`, '#22c55e');
            } else if (card.type === "draw") {
                drawCard(currentPlayer, card.value);
                message += ` 📚 Drew ${card.value}`;
            } else if (card.type === "manaDrain") {
                opponent.mana = Math.max(0, opponent.mana - card.value);
                message += ` ⚡ Drained Spark`;
            }

            addLog(message);
            renderHP();
            renderMana(currentPlayer, currentPlayer === p1 ? 'mana1' : 'mana2');
            renderHands();

            if (opponent.hp <= 0) endGame();
        }

        function drawCard(player, count = 1) {
            for (let i = 0; i < count; i++) {
                if (player.deck.length > 0 && player.hand.length < 7) {
                    player.hand.push(player.deck.shift());
                }
            }
        }

        function startTurn() {
            currentPlayer.mana = Math.min(currentPlayer.maxMana, currentPlayer.mana + 1);
            drawCard(currentPlayer, 1);
            renderMana(currentPlayer, currentPlayer === p1 ? 'mana1' : 'mana2');
            renderHands();
        }

        function endTurn() {
            if (gameOver) return;
            currentPlayer = (currentPlayer === p1) ? p2 : p1;
            opponent = (currentPlayer === p1) ? p2 : p1;
            document.getElementById('endTurnBtn').textContent = `END ${currentPlayer.name.toUpperCase()}'S TURN`;
            startTurn();
        }

        function endGame() {
            gameOver = true;
            const winner = p1.hp > 0 ? p1 : p2;
            const loser = winner === p1 ? p2 : p1;

            document.getElementById('winEmoji').textContent = winner.emoji;
            document.getElementById('winTitle').innerHTML = `${winner.name} WINS HER HEART! 💖`;
            document.getElementById('winSub').innerHTML = `You get to pick the victory reward:<br>💋 Victory kiss • 🛏️ Massage • 🎥 Movie night choice`;
            document.getElementById('victory').classList.remove('hidden');

            launchConfetti();
        }

        function launchConfetti() {
            for (let i = 0; i < 150; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.textContent = ['💖','💋','❤️','🌹'][Math.floor(Math.random()*4)];
                    c.style.position = 'fixed';
                    c.style.left = Math.random()*100 + 'vw';
                    c.style.top = '-50px';
                    c.style.fontSize = '30px';
                    c.style.zIndex = '9999';
                    document.body.appendChild(c);
                    setTimeout(() => {
                        c.style.transition = 'all 4s';
                        c.style.transform = `translateY(${window.innerHeight + 200}px) rotate(${Math.random()*800}deg)`;
                        c.style.opacity = '0';
                    }, 50);
                    setTimeout(() => c.remove(), 4500);
                }, i * 6);
            }
        }

        function resetGame() {
            p1.hp = p1.maxHp = 20; p1.mana = 0; p1.hand = []; p1.deck = []; p1.discard = [];
            p2.hp = p2.maxHp = 20; p2.mana = 0; p2.hand = []; p2.deck = []; p2.discard = [];
            gameOver = false;
            document.getElementById('victory').classList.add('hidden');
            initDecks();
            currentPlayer = p1;
            opponent = p2;
            startTurn();
            renderHP();
            document.getElementById('endTurnBtn').textContent = "END DAN'S TURN";
        }

        // Start the love
        initDecks();
        currentPlayer = p1;
        opponent = p2;
        startTurn();
        renderHP();
        renderMana(p1, 'mana1');
        renderMana(p2, 'mana2');
        renderHands();
    </script>
</body>
</html>
